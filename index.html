<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório Mensal Tamiris</title>
<style>
*{box-sizing:border-box}
body{font-family:Arial,sans-serif;margin:0;background:#F5F5F0;color:#2b2b2b}
.login,.app{max-width:1250px;margin:28px auto;background:#fff;padding:24px;border-radius:14px;box-shadow:0 4px 18px rgba(0,0,0,.08)}
.login{max-width:560px;margin-top:70px}
h1,h2,h3{color:#35451F;margin-top:0}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;align-items:end}
input,select,button{padding:10px;font-size:14px;border-radius:7px}
input,select{border:1px solid #cfcfc7;width:100%}
button{background:#556B2F;color:#fff;border:0;font-weight:bold;cursor:pointer}
button:hover{background:#6B8E23}
.btn-danger{background:#8B2D2D}
.btn-danger:hover{background:#A13A3A}
.btn-edit{background:#D88900}
.btn-secondary{background:#6b7280}
.topo{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:18px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;margin:16px 0}
.card{background:#EEF4E4;border-left:5px solid #556B2F;border-radius:10px;padding:14px;font-weight:bold}
.card small{display:block;color:#555;margin-bottom:7px}
table{width:100%;border-collapse:collapse;margin-top:15px;font-size:13px}
th,td{border:1px solid #d0d0d0;padding:8px;text-align:left}
th{background:#556B2F;color:#fff}
tr:nth-child(even){background:#fafafa}
.acoes{display:flex;gap:6px;flex-wrap:wrap}
.acoes button{padding:7px 10px;font-size:12px}
.muted{color:#666;font-size:12px}
.erro{color:#b00020;font-weight:bold}
.barra{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0}
@media(max-width:760px){.login,.app{margin:10px;padding:14px} table{font-size:11px}}
@media print{.no-print{display:none!important}body{background:#fff}.app{box-shadow:none;margin:0;max-width:100%;padding:10px}}
</style>
</head>
<body>

<section id="loginBox" class="login">
  <h1>Relatório Mensal Tamiris</h1>
  <p>Digite seu e-mail cadastrado na aba <b>Usuarios</b>.</p>
  <label>E-mail</label>
  <input id="emailLogin" type="email" placeholder="seuemail@gmail.com">
  <br><br>
  <button onclick="fazerLogin()">Entrar</button>
  <p id="msgLogin" class="erro"></p>
</section>

<section id="appBox" class="app" style="display:none">
  <div class="topo no-print">
    <div>
      <h1>Relatório Mensal Tamiris</h1>
      <div class="muted" id="usuarioInfo"></div>
    </div>
    <button class="btn-danger" onclick="sair()">Sair</button>
  </div>

  <div class="grid no-print">
    <div>
      <label>Mês do relatório</label>
      <input id="filtroMes" type="month" onchange="carregarDados()">
    </div>
    <div id="boxFiltroConsultor">
      <label>Consultor</label>
      <select id="filtroConsultor" onchange="carregarDados()">
        <option value="">Todos</option>
      </select>
    </div>
    <div>
      <label>Pesquisar</label>
      <input id="pesquisa" placeholder="Empresa, pagador, NF ou item..." oninput="renderTabela()">
    </div>
    <div>
      <label>&nbsp;</label>
      <button onclick="limparFormulario()">Novo lançamento</button>
    </div>
  </div>

  <div class="cards">
    <div class="card"><small>Total do mês</small><span id="totalMes">R$ 0,00</span></div>
    <div class="card"><small>Quantidade de notas</small><span id="qtdNotas">0</span></div>
    <div class="card"><small>Quantidade de empresas</small><span id="qtdEmpresas">0</span></div>
  </div>

  <div class="barra no-print">
    <button onclick="exportarExcel()">Exportar Excel</button>
    <button class="btn-secondary" onclick="window.print()">Gerar PDF</button>
  </div>

  <div class="no-print">
    <h2>Cadastro</h2>
    <div class="grid">
      <input type="hidden" id="idRegistro">
      <div id="campoConsultor">
        <label>Consultor</label>
        <select id="consultor"></select>
      </div>
      <div><label>Empresa</label><input id="empresa"></div>
      <div><label>Nome Pagador</label><input id="nomePagador"></div>
      <div><label>Nota Fiscal</label><input id="notaFiscal"></div>
      <div><label>Valor</label><input id="valor" inputmode="decimal" placeholder="R$ 0,00" onblur="formatarMoedaCampo(this)"></div>
      <div><label>Data Pagamento</label><input id="dataPagamento" type="date"></div>
<div><label>Data Cadastro</label><input id="dataCadastro" type="date"></div>
      <div><label>Parcela</label><input id="parcela" placeholder="Ex: 1/3"></div>
      <div><label>Item</label><input id="item"></div>
      <div><label>&nbsp;</label><button onclick="salvarLancamento()">Salvar</button></div>
    </div>
    <p id="msg" class="muted"></p>
  </div>

  <h2>Relatório do mês</h2>
  <table>
    <thead>
      <tr>
        <th>Consultor</th><th>Empresa</th><th>Nome Pagador</th><th>Nota Fiscal</th>
<th>Valor</th><th>Data Pagamento</th><th>Data Cadastro</th><th>Parcela</th><th>Item</th><th class="no-print">Ações</th>
      </tr>
    </thead>
    <tbody id="tabela"></tbody>
  </table>
</section>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxIbvTFzj2RY0dg_GdwZi2wpsCDCBT8tWRcBFeHd6DFTBqHN4yVibXiZ7G9DQdOfNT1Gw/exec";
let usuarioLogado = null;
let lancamentos = [];
let consultores = [];

function moeda(v){
  return (Number(v)||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
}

function numero(v){
  if(typeof v === 'number') return v;
  let s = String(v||'').replace('R$','').replace(/\s/g,'').trim();
  if(s.includes(',') && s.includes('.')) s = s.replace(/\./g,'').replace(',','.');
  else if(s.includes(',')) s = s.replace(',','.');
  return parseFloat(s)||0;
}

function formatarMoedaCampo(campo){
  campo.value = moeda(numero(campo.value));
}

async function api(acao, dados={}){
  const resp = await fetch(API_URL,{
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({acao,...dados})
  });
  return await resp.json();
}

function mesAtual(){
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
}

async function fazerLogin(){
  const email = emailLogin.value.trim().toLowerCase();
  if(!email){alert('Digite seu e-mail.'); return;}
  msgLogin.textContent = 'Verificando acesso...';
  try{
    const r = await api('login',{email});
    if(!r.ok){msgLogin.textContent = r.erro || 'Acesso negado'; return;}
    usuarioLogado = r.usuario;
    localStorage.setItem('usuario_relatorio_tamiris', JSON.stringify(usuarioLogado));
    localStorage.setItem('usuario_relatorio_tamiris_email', email);
    abrirApp();
  }catch(e){
    msgLogin.textContent = 'Erro ao conectar com a API: ' + e.message;
  }
}

async function abrirApp(){
  loginBox.style.display='none';
  appBox.style.display='block';
  usuarioInfo.textContent = `${usuarioLogado.nome} | ${usuarioLogado.email} | ${usuarioLogado.perfil}`;
  const isAdm = String(usuarioLogado.perfil||'').toUpperCase() === 'ADM';
  boxFiltroConsultor.style.display = isAdm ? 'block' : 'none';
  campoConsultor.style.display = isAdm ? 'block' : 'none';
  filtroMes.value = mesAtual();
  await carregarDados();
}

async function carregarDados(){
  msg.textContent = 'Carregando...';
  const r = await api('listar',{usuario: usuarioLogado, mes: filtroMes.value, consultor: filtroConsultor.value});
  if(!r.ok){msg.textContent = r.erro || 'Erro ao carregar'; return;}
  lancamentos = r.lancamentos || [];
  consultores = r.todosConsultores || [];
  preencherConsultores();
  renderTabela();
  msg.textContent = 'Dados carregados.';
}

function preencherConsultores(){
  const isAdm = String(usuarioLogado.perfil||'').toUpperCase() === 'ADM';

  const listaConsultores = consultores.length ? consultores : [
    'Tassio Borges',
    'Tamila Pereira'
  ];

  const valorFiltro = filtroConsultor.value;
  const valorCadastro = consultor.value;

  filtroConsultor.innerHTML = '<option value="">Todos</option>';
  consultor.innerHTML = '<option value="">Selecione</option>';

  listaConsultores.forEach(c=>{
    filtroConsultor.innerHTML += `<option value="${c}">${c}</option>`;
    consultor.innerHTML += `<option value="${c}">${c}</option>`;
  });

  filtroConsultor.value = valorFiltro;

  if(isAdm){
    consultor.value = valorCadastro;
  } else {
    const c = usuarioLogado.consultorVinculado || usuarioLogado.nome;
    consultor.innerHTML = `<option value="${c}">${c}</option>`;
    consultor.value = c;
  }
}

function renderTabela(){
  const termo = (pesquisa.value || '').toLowerCase();
  const filtrado = lancamentos.filter(l => Object.values(l).join(' ').toLowerCase().includes(termo));
  let total = 0;
  const empresas = new Set();
  const notas = new Set();
  tabela.innerHTML = '';
  filtrado.forEach(l=>{
    total += numero(l.Valor);
    if(l.Empresa) empresas.add(l.Empresa);
    if(l['Nota Fiscal']) notas.add(l['Nota Fiscal']);
    tabela.innerHTML += `
      <tr>
        <td>${l.Consultor||''}</td>
        <td>${l.Empresa||''}</td>
        <td>${l['Nome Pagador']||''}</td>
        <td>${l['Nota Fiscal']||''}</td>
        <td>${moeda(numero(l.Valor))}</td>
        <td>${l['Data Pagamento']||''}</td>
<td>${l['Data Cadastro']||''}</td>
        <td>${l.Parcela||''}</td>
        <td>${l.Item||''}</td>
        <td class="no-print"><div class="acoes">
          <button class="btn-edit" onclick='editar(${JSON.stringify(l)})'>Editar</button>
          <button class="btn-danger" onclick="excluirLancamento('${l.ID}')">Excluir</button>
        </div></td>
      </tr>
    `;
  });
  totalMes.textContent = moeda(total);
  qtdNotas.textContent = notas.size;
  qtdEmpresas.textContent = empresas.size;
}

async function salvarLancamento(){
  const itemObj = {
  ID: idRegistro.value,
  Consultor: consultor.value,
  Empresa: empresa.value.trim(),
  'Nome Pagador': nomePagador.value.trim(),
  'Nota Fiscal': notaFiscal.value.trim(),
  Valor: numero(valor.value),
  'Data Pagamento': dataPagamento.value,
  'Data Cadastro': dataCadastro.value,
  Parcela: parcela.value.trim(),
  Item: item.value.trim()
};
  if(!itemObj.Empresa || !itemObj['Nome Pagador'] || !itemObj.Valor || !itemObj['Data Pagamento'] || !itemObj['Data Cadastro']){
  alert('Preencha Empresa, Nome Pagador, Valor, Data Pagamento e Data Cadastro.');
    return;
  }
  const r = await api('salvar',{usuario:usuarioLogado,item:itemObj});
  if(!r.ok){alert(r.erro || 'Erro ao salvar'); return;}
  limparFormulario();
  await carregarDados();
}

function editar(l){
  idRegistro.value = l.ID || '';
  consultor.value = l.Consultor || '';
  empresa.value = l.Empresa || '';
  nomePagador.value = l['Nome Pagador'] || '';
  notaFiscal.value = l['Nota Fiscal'] || '';
  valor.value = moeda(numero(l.Valor));
  dataPagamento.value = l['Data Pagamento'] || '';
dataCadastro.value = l['Data Cadastro'] || '';
  parcela.value = l.Parcela || '';
  item.value = l.Item || '';
  window.scrollTo({top:0,behavior:'smooth'});
}

async function excluirLancamento(id){
  if(!confirm('Deseja excluir este lançamento?')) return;
  const r = await api('excluir',{usuario:usuarioLogado,id});
  if(!r.ok){alert(r.erro || 'Erro ao excluir'); return;}
  await carregarDados();
}

function limparFormulario(){
  idRegistro.value = '';
  empresa.value = '';
  nomePagador.value = '';
  notaFiscal.value = '';
  valor.value = '';
  dataPagamento.value = '';
dataCadastro.value = '';
  parcela.value = '';
  item.value = '';
  if(consultor.options.length) consultor.selectedIndex = 0;
}

function exportarExcel(){
  const linhas = [];
  linhas.push(['Consultor','Empresa','Nome Pagador','Nota Fiscal','Valor','Data','Parcela','Item']);
  const termo = (pesquisa.value || '').toLowerCase();
  const filtrado = lancamentos.filter(l => Object.values(l).join(' ').toLowerCase().includes(termo));
  filtrado.forEach(l=>{
    linhas.push([l.Consultor||'',l.Empresa||'',l['Nome Pagador']||'',l['Nota Fiscal']||'',numero(l.Valor),l['Data Pagamento']||'',l.Parcela||'',l.Item||'']);
  });
  const total = filtrado.reduce((s,l)=>s+numero(l.Valor),0);
  linhas.push([]);
  linhas.push(['Total do mês','','','',total,'','','']);
  linhas.push(['Quantidade de notas','','','',new Set(filtrado.map(l=>l['Nota Fiscal']).filter(Boolean)).size,'','','']);
  linhas.push(['Quantidade de empresas','','','',new Set(filtrado.map(l=>l.Empresa).filter(Boolean)).size,'','','']);
  const csv = linhas.map(l => l.map(c => `"${String(c).replace(/"/g,'""')}"`).join(';')).join('\n');
  const blob = new Blob(['\ufeff' + csv], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `relatorio_mensal_${filtroMes.value || 'todos'}.csv`;
  a.click();
}

function sair(){
  localStorage.removeItem('usuario_relatorio_tamiris');
  localStorage.removeItem('usuario_relatorio_tamiris_email');
  location.reload();
}

window.addEventListener('load', async ()=>{
  const salvo = localStorage.getItem('usuario_relatorio_tamiris');
  if(salvo){
    usuarioLogado = JSON.parse(salvo);
    await abrirApp();
    return;
  }
  const email = localStorage.getItem('usuario_relatorio_tamiris_email') || '';
  if(email) emailLogin.value = email;
});
</script>
</body>
</html>
